<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - Local Lift</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
    <!-- Header -->
    <header class="navbar">
    <a href="../index.html" class="logo">Local Lift</a>
      <nav>
          <a href="../index.html">Home</a>
          <a href="favorites.html">Favorites</a>
          <a href="help.html">Help</a>
          <button id="logoutBtn">Logout</button>
      </nav>
  </header>


    <!-- Main Profile Content -->
    <main class="profile-wrapper">
        <div class="profile-container">
            <h2>Your Profile</h2>
            <div class="profile-info">
                <p><strong>Name:</strong> <span id="profileName">Loading...</span></p>
                <p><strong>Email:</strong> <span id="profileEmail">Loading...</span></p>
                <p><strong>Password:</strong> <span id="profilePassword">********</span></p>
            </div>
        </div>
    </main>

    <!-- Firebase and JS scripts -->
    <script type="module" src="../js/firebase.js"></script>
    <script type="module" src="../js/profile.js"></script>
</body>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
    VANTA.NET({
      el: "body",
      gyroControls: false,
      mouseControls: false,
      touchControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x369a9,
      backgroundColor: 0x1b153c,
      speed: 0.5
    });
    </script>
</html>
