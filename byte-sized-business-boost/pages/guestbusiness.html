<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Businesses - Local Lift</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/business.css">
</head>
<body>
    <header class="navbar">
        <a href="../index.html" class="logo">Local Lift</a>
        <nav>
            <a href="help.html">Help</a>
            <button onclick="window.location.href='login.html'">Login</button>
        </nav>
    </header>

    <main id="main-content-container">
        <div class="guest-banner">
            <p>Browsing as guest &mdash; <a href="login.html">log in</a> or <a href="signup.html">sign up</a> to favorite businesses and leave reviews.</p>
        </div>
        <div class="controls">
            <label>Category: <select id="categoryFilter"></select></label>
            <label>Sort: <select id="sortSelect">
                <option value="">None</option>
                <option value="rating-desc">Rating (high &rarr; low)</option>
                <option value="rating-asc">Rating (low &rarr; high)</option>
                <option value="category-asc">Category (A &rarr; Z)</option>
            </select></label>
        </div>
        <div id="businessContainer"></div>
    </main>

    <script type="module">
        import { renderGuestBusinessCards } from '../js/guestbusinesses.js';
        renderGuestBusinessCards();
    </script>
</body>
</html>
