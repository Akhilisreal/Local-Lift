<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Lift</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/business.css">
</head>
<body class="no-navbar-gap">
  <div id="vanta-bg"></div>
  <!-- Header -->
  <header class="navbar">
    <a href="landing.html" class="logo">Local Lift</a>
    <nav>
      <a href="pages/favorites.html">Favorites</a>
      <a href="pages/profile.html">Profile</a>
      <a href="pages/report.html">Custom Report</a>
      <a href="pages/help.html">Help</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <!-- Main content container for business cards -->
  <main id="main-content-container">
    <div class="controls">
      <div class="search-control">
        <input type="text" id="businessSearch" placeholder="Search businesses..." autocomplete="off">
      </div>
      <div class="filter-control">
        <label>Category: <select id="categoryFilter"></select></label>
      </div>
      <div class="sort-control">
        <label>Sort: <select id="sortSelect">
          <option value="">None</option>
          <option value="rating-desc">Rating (high → low)</option>
          <option value="rating-asc">Rating (low → high)</option>
          <option value="category-asc">Category (A → Z)</option>
        </select></label>
      </div>
    </div>
    <div id="businessContainer"></div>
  </main>

  <script type="module">
    import './js/navbar.js';
    import { auth } from "./js/auth.js";
    import { renderBusinessCards } from "./js/businesses.js";

    // Attach logout functionality
    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
      logoutBtn.onclick = () => {
        auth.signOut().then(() => {
          window.location.href = "./pages/login.html";
        });
      };
    }

    // Render business cards if logged in
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "./pages/login.html";
      } else {
        renderBusinessCards();
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
  <script>VANTA.WAVES({el:"#vanta-bg",mouseControls:true,touchControls:true,gyroControls:false,minHeight:200,minWidth:200,scale:1,scaleMobile:1,color:0x40013,shininess:13,waveHeight:14.5,waveSpeed:0.85,zoom:1.15});</script>
</body>
</html>
