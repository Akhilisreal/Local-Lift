<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Lift</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/business.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
</head>
<body>
  <div id="vanta-bg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div>
  <!-- Header -->
  <header class="navbar">
    <a href="index.html" class="logo">Local Lift</a>
    <nav>
      <a href="pages/favorites.html">Favorites</a>
      <a href="pages/profile.html">Profile</a>
      <a href="pages/help.html">Help</a>
      <button id="logoutBtn">Logout</button>
    </nav>
  </header>

  <!-- Main content container for business cards -->
  <main id="main-content-container">
    <div class="controls">
      <label>Category: <select id="categoryFilter"></select></label>
      <label>Sort: <select id="sortSelect">
        <option value="">None</option>
        <option value="rating-desc">Rating (high → low)</option>
        <option value="rating-asc">Rating (low → high)</option>
        <option value="category-asc">Category (A → Z)</option>
      </select></label>
    </div>
    <div id="businessContainer"></div>
  </main>

  <script type="module">
    import { auth } from "./js/auth.js";
    import { renderBusinessCards } from "./js/businesses.js";

    // Attach logout functionality
    const logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) {
      logoutBtn.onclick = () => {
        auth.signOut().then(() => {
          window.location.href = "./pages/login.html";
        });
      };
    }

    // Render business cards if logged in
    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = "./pages/login.html";
      } else {
        renderBusinessCards();
      }
    });
  </script>
  <script>
    VANTA.NET({
      el: "#vanta-bg",
      gyroControls: false,
      mouseControls: false,
      touchControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x369a9,
      backgroundColor: 0x1b153c,
      points: 50.00,
      maxDistance: 25.00,
      spacing: 15.00,
      speed: 1.0
    });
    </script>
</body>
</html>
