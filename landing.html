<!DOCTYPE html>
<!--final push 4/4-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to Local Lift</title>
  <link rel="stylesheet" href="css/common.css" />
  <style>
    body {
      padding-top: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .landing-hero {
      text-align: center;
      max-width: 620px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    .landing-hero h1 {
      font-size: 3.2rem;
      font-weight: 700;
      color: var(--text);
      margin: 0;
      line-height: 1.2;
    }

    .landing-hero p {
      font-size: 1.1rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }

    .landing-cta {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .landing-cta button {
      padding: 14px 32px;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 160px;
    }

    .landing-cta .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #0b0c14;
    }

    .landing-cta .primary:hover {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      transform: translateY(-2px);
    }

    .landing-cta .secondary {
      background: rgba(255, 255, 255, 0.12);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .landing-cta .secondary:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div id="vanta-bg"></div>
  <div class="landing-hero">
    <h1>Welcome to Local Lift</h1>
    <p>
      Discover the best local businesses in your area. Read verified reviews, check ratings, and save your favorites.
      Start exploring today — no account needed.
    </p>
    <div class="landing-cta">
      <button class="secondary" onclick="location.href='pages/guestbusiness.html'">Browse as Guest</button>
      <button class="primary" onclick="location.href='pages/login.html'">Log In / Create Account</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
  <script>VANTA.WAVES({el:"#vanta-bg",mouseControls:false,touchControls:false,gyroControls:false,minHeight:200,minWidth:200,scale:1,scaleMobile:1,color:0x40013,shininess:13,waveHeight:14.5,waveSpeed:0.85,zoom:1.15});</script>
</body>
</html>
