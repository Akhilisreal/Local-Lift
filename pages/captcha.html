<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification - Local Lift</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/auth.css">
    <style>
        .captcha-container { max-width: 420px; margin: 60px auto; text-align: center; }
        .captcha-image { border: 1px solid #e0e0e0; display:block; margin: 12px auto; width:300px; height:80px; }
        .captcha-input { width: 100%; padding: 10px; margin: 8px 0; }
        .captcha-actions { display:flex; gap:8px; justify-content:center; }
        .captcha-hint { margin-top: 10px; font-size: .9rem; color: #666; }
    </style>
</head>
<body>
    <div id="vanta-bg"></div>
    <div class="captcha-container auth-container">
        <h2>Human Verification</h2>
        <p id="captcha-msg" class="error-msg"></p>
        <img id="captchaImg" class="captcha-image" src="" alt="captcha image">
        <input id="captchaInput" class="captcha-input" placeholder="Type the characters you see in the image" autocomplete="off">
        <div class="captcha-actions">
            <button id="verifyBtn">Verify</button>
            <button id="refreshBtn">Refresh</button>
        </div>
        <p class="captcha-hint">Passing this verification is required before accessing the login page.</p>
        <p class="switch-link" style="margin-top:16px"><a href="guestbusiness.html">Browse as guest instead</a></p>
    </div>

    <script src="../js/captcha.js"></script>
    <script type="module" src="../js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
    <script>VANTA.WAVES({el:"#vanta-bg",mouseControls:false,touchControls:false,gyroControls:false,minHeight:200,minWidth:200,scale:1,scaleMobile:1,color:0x40013,shininess:13,waveHeight:14.5,waveSpeed:0.85,zoom:1.15});</script>
</body>
</html>
