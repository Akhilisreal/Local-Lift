<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Negocios - Local Lift</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/business.css">
</head>
<body class="no-navbar-gap">
    <div id="vanta-bg"></div>
    <header class="navbar">
        <a href="/landing.html" class="logo">Local Lift</a>
        <nav>
            <a href="guestbusiness.html">Inicio</a>
            <a href="guesthelp.html">Ayuda</a>
            <button onclick="window.location.href='login.html'">Iniciar Sesión</button>
        </nav>
    </header>

    <!-- Listing view: shown when no businessId in URL -->
    <div id="listingSection" style="display:none">
        <div class="controls">
            <div class="search-control">
                <input type="text" id="businessSearch" placeholder="Buscar negocios..." autocomplete="off">
            </div>
            <div class="filter-control">
                <label>Categoría: <select id="categoryFilter"></select></label>
            </div>
            <div class="sort-control">
                <label>Ordenar:
                    <select id="sortSelect">
                        <option value="">Ninguno</option>
                        <option value="rating-desc">Calificación (alta → baja)</option>
                        <option value="rating-asc">Calificación (baja → alta)</option>
                        <option value="category-asc">Categoría (A → Z)</option>
                    </select>
                </label>
            </div>
        </div>
        <div id="businessContainer"></div>
    </div>

    <!-- Detail view: shown when businessId is in URL -->
    <main class="business-details-container" id="businessDetailsContainer" style="display:none"></main>
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDjstOksQwkGQYZ1YNuHeCpJbI1qxc7o58&libraries=maps,marker&loading=async"
        async
    ></script>

    <script type="module">
        import '../js/navbar.js';
        import { auth } from '../js/auth.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { renderGuestBusinessCards, renderGuestBusinessDetails } from '../js/guestbusinesses.js';

        const businessId = new URLSearchParams(window.location.search).get('businessId');

        function render() {
            if (businessId) {
                document.getElementById('businessDetailsContainer').style.display = '';
                document.title = 'Business Details - Local Lift';
                renderGuestBusinessDetails();
            } else {
                document.getElementById('listingSection').style.display = '';
                renderGuestBusinessCards();
            }
        }

        // Sign in with proxy account so Firebase DB reads succeed, then render.
        signInWithEmailAndPassword(auth, 'haritest@gmail.com', 'haritest123')
            .then(render)
            .catch(err => {
                console.warn('Proxy sign-in failed, attempting render anyway', err);
                render();
            });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
    <script>VANTA.WAVES({el:"#vanta-bg",mouseControls:false,touchControls:false,gyroControls:false,minHeight:200,minWidth:200,scale:1,scaleMobile:1,color:0x40013,shininess:13,waveHeight:14.5,waveSpeed:0.85,zoom:1.15});</script>
</body>
</html>
