<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Businesses - Local Lift</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/business.css">
</head>
<body>
    <header class="navbar">
        <a href="guestbusiness.html" class="logo">Local Lift</a>
        <nav>
            <a href="guesthelp.html">Help</a>
            <button onclick="window.location.href='login.html'">Login</button>
        </nav>
    </header>

    <!-- Listing view: shown when no businessId in URL -->
    <div id="listingSection" style="display:none">
        <div class="controls">
            <label>Category: <select id="categoryFilter"></select></label>
            <label>Sort:
                <select id="sortSelect">
                    <option value="">None</option>
                    <option value="rating-desc">Rating (high → low)</option>
                    <option value="rating-asc">Rating (low → high)</option>
                    <option value="category-asc">Category (A → Z)</option>
                </select>
            </label>
        </div>
        <div id="businessContainer"></div>
    </div>

    <!-- Detail view: shown when businessId is in URL -->
    <main class="business-details-container" id="businessDetailsContainer" style="display:none"></main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
    VANTA.NET({
      el: "body",
      gyroControls: false,
      mouseControls: false,
      touchControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x369a9,
      backgroundColor: 0x1b153c,
      speed: 0.5
    });
    </script>
    <script type="module">
        import { auth } from '../js/auth.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { renderGuestBusinessCards, renderGuestBusinessDetails } from '../js/guestbusinesses.js';

        const businessId = new URLSearchParams(window.location.search).get('businessId');

        function render() {
            if (businessId) {
                document.getElementById('businessDetailsContainer').style.display = '';
                document.title = 'Business Details - Local Lift';
                renderGuestBusinessDetails();
            } else {
                document.getElementById('listingSection').style.display = '';
                renderGuestBusinessCards();
            }
        }

        // Sign in with proxy account so Firebase DB reads succeed, then render.
        signInWithEmailAndPassword(auth, 'haritest@gmail.com', 'haritest123')
            .then(render)
            .catch(err => {
                console.warn('Proxy sign-in failed, attempting render anyway', err);
                render();
            });
    </script>
</body>
</html>
