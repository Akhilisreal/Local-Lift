<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Details - Local Lift</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/business.css">
</head>
<body>
    <header class="navbar">
        <a href="../index.html" class="logo">Local Lift</a>
        <nav>
            <a href="help.html">Help</a>
            <button onclick="window.location.href='login.html'">Login</button>
        </nav>
    </header>

    <main class="business-details-container" id="businessDetailsContainer">
        <p style="color:#fff;text-align:center;margin-top:2rem">Loading...</p>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
    VANTA.NET({
      el: "body",
      gyroControls: false,
      mouseControls: false,
      touchControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x369a9,
      backgroundColor: 0x1b153c,
      speed: 0.5
    });
    </script>
    <script type="module">
        import { auth } from '../js/auth.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { renderGuestBusinessDetails } from '../js/guestbusinesses.js';

        // Sign in silently with the proxy account so Firebase DB reads succeed,
        // then render the read-only business detail view (no favorites or review form).
        signInWithEmailAndPassword(auth, 'haritest@gmail.com', 'haritest123')
            .then(() => renderGuestBusinessDetails())
            .catch(err => {
                console.warn('Proxy sign-in failed, attempting guest render anyway', err);
                renderGuestBusinessDetails();
            });
    </script>
</body>
</html>
