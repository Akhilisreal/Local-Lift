<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favorites - Local Lift</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/business.css">
    <style>
        .empty-favorites-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.85);
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <!-- Header/Navbar -->
    <header class="navbar">
        <a href="../index.html" class="logo">Local Lift</a>
        <nav>
            <a href="../index.html">Home</a>
            <a href="profile.html">Profile</a>
            <a href="report.html">Custom Report</a>
            <a href="help.html">Help</a>
            <button id="logoutBtn">Logout</button>
        </nav>
    </header>

    <!-- Favorites container -->
    <main class="favorites-container" id="favoritesContainer">
        <!-- Favorite businesses will be rendered here automatically -->
    </main>

    <!-- Firebase/Auth scripts -->
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/favorites.js"></script>

    <!-- Render favorites on page load -->
    <script type="module">
        import { renderFavorites } from '../js/favorites.js';
        renderFavorites('favoritesContainer');
    </script>
</body>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
    VANTA.NET({
      el: "body",
      gyroControls: false,
      mouseControls: false,
      touchControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x369a9,
      backgroundColor: 0x1b153c,
      speed: 0.5
    });
    </script>
</html>
