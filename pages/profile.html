<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - Local Lift</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
    <div id="vanta-bg"></div>
    <!-- Header -->
    <header class="navbar">
    <a href="/landing.html" class="logo">Local Lift</a>
      <nav>
          <a href="../index.html">Home</a>
          <a href="favorites.html">Favorites</a>
          <a href="report.html">Custom Report</a>
          <a href="help.html">Help</a>
          <button id="logoutBtn">Logout</button>
      </nav>
  </header>


    <!-- Main Profile Content -->
    <main class="profile-wrapper">
        <div class="profile-container">
            <h2>Your Profile</h2>
            <div class="profile-info">
                <p><strong>Name:</strong> <span id="profileName">Loading...</span></p>
                <p><strong>Email:</strong> <span id="profileEmail">Loading...</span></p>
                <p><strong>Password:</strong> <span id="profilePassword">********</span></p>
            </div>
        </div>
    </main>

    <!-- Firebase and JS scripts -->
    <script type="module" src="../js/firebase.js"></script>
    <script type="module" src="../js/profile.js"></script>
    <script type="module" src="../js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
    <script>VANTA.WAVES({el:"#vanta-bg",mouseControls:true,touchControls:true,gyroControls:false,minHeight:200,minWidth:200,scale:1,scaleMobile:1,color:0x40013,shininess:13,waveHeight:14.5,waveSpeed:0.85,zoom:1.15});</script>
</body>
</html>
