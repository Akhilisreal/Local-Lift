<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrarse - Local Lift</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div id="vanta-bg"></div>
    <div class="auth-container">
        <h2>Registrarse</h2>
        <p class="error-msg" id="signupError"></p>
        <input type="text" id="signupName" placeholder="Nombre">
        <input type="email" id="signupEmail" placeholder="Correo electrónico">
        <input type="password" id="signupPassword" placeholder="Contraseña">
        <button id="signupBtn">Registrarse</button>
        <p class="switch-link">¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a></p>
    </div>

    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
    <script>VANTA.WAVES({el:"#vanta-bg",mouseControls:false,touchControls:false,gyroControls:false,minHeight:200,minWidth:200,scale:1,scaleMobile:1,color:0x40013,shininess:13,waveHeight:14.5,waveSpeed:0.85,zoom:1.15});</script>
</body>
</html>
