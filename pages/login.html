<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Local Lift</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div class="auth-container">
        <h2>Login</h2>
        <p class="error-msg" id="loginError"></p>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn">Log In</button>
        <p class="switch-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
        <p class="switch-link"><a href="guestbusiness.html">Continue as guest</a></p>
    </div>

    <script>
        // Require captcha pass before allowing access to login page.
        (function() {
            try {
                const passed = sessionStorage.getItem('captchaPassed');
                if (passed !== 'true') {
                    window.location.href = 'captcha.html';
                } else {
                    // Consume the flag so each new visit requires a fresh captcha
                    sessionStorage.removeItem('captchaPassed');
                }
            } catch (e) {
                window.location.href = 'captcha.html';
            }
        })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
    VANTA.NET({
      el: "body",
      gyroControls: false,
      mouseControls: false,
      touchControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0x369a9,
      backgroundColor: 0x1b153c,
      speed: 0.5
    });
    </script>
    

    <script type="module" src="../js/auth.js"></script>
</body>
</html>
