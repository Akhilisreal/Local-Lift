<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Local Lift</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div id="vanta-bg"></div>
    <div class="auth-container">
        <h2>Login</h2>
        <p class="error-msg" id="loginError"></p>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn">Log In</button>
        <p class="switch-link">Don't have an account? <a href="signup.html">Sign Up</a></p>
        <p class="switch-link"><a href="guestbusiness.html">Continue as guest</a></p>
    </div>

    <script>
        // Require captcha pass before allowing access to login page.
        (function() {
            try {
                const passed = sessionStorage.getItem('captchaPassed');
                if (passed !== 'true') {
                    window.location.href = 'captcha.html';
                }
            } catch (e) {
                window.location.href = 'captcha.html';
            }
        })();
    </script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.waves.min.js"></script>
    <script>VANTA.WAVES({el:"#vanta-bg",mouseControls:true,touchControls:true,gyroControls:false,minHeight:200,minWidth:200,scale:1,scaleMobile:1,color:0x40013,shininess:13,waveHeight:14.5,waveSpeed:0.85,zoom:1.15});</script>
</body>
</html>
